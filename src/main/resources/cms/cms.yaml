kind: "CMS"
form:
  - type: "FieldSet"
    label: "Company"
    items:
      - type: "TextLine"
        name: "companyName"
        label: "Name"
        occurrences:
          min: 1
          max: 1
  - type: "FieldSet"
    label: "Footer"
    items:
      - type: "HtmlArea"
        name: "footerText"
        label: "Footer text"
        occurrences:
          min: 0
          max: 1
      - type: "ComboBox"
        name: "footerSocial"
        label: "Social"
        occurrences:
          min: 0
          max: 0
        options:
          - value: "facebook"
            label: "Facebook"
          - value: "twitter"
            label: "Twitter"
          - value: "linkedin"
            label: "LinkedIn"
          - value: "instagram"
            label: "Instagram"
      - type: "CheckBox"
        name: "footerNavigation"
        label: "Show navigation in footer"
        occurrences:
          min: 0
          max: 1
